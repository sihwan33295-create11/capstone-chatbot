<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>순천향대 캡스톤디자인 AI 안내 챗봇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 760px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }

        /* 헤더 */
        .chat-header {
            background: linear-gradient(135deg, #003087 0%, #0057b8 100%);
            color: white;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-logo-img {
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 50%;
            object-fit: contain;
            padding: 6px;
            flex-shrink: 0;
        }

        .header-divider {
            width: 1px;
            height: 36px;
            background: rgba(255,255,255,0.35);
            flex-shrink: 0;
        }

        .header-text h1 {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header-text p {
            font-size: 11.5px;
            opacity: 0.75;
            margin-top: 3px;
        }

        .header-badge {
            margin-left: auto;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* API 키 입력 화면 */
        #api-setup {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            background: #f8f9fc;
        }

        .setup-card {
            background: white;
            border-radius: 16px;
            padding: 36px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        .setup-icon { font-size: 48px; margin-bottom: 16px; }

        .setup-card h2 {
            font-size: 18px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .setup-card p {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .setup-card input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e6f0;
            border-radius: 10px;
            font-size: 14px;
            font-family: monospace;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 14px;
        }

        .setup-card input:focus { border-color: #003087; }

        .setup-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #003087, #0057b8);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .setup-btn:hover { opacity: 0.9; }

        .setup-note {
            margin-top: 14px;
            font-size: 12px;
            color: #999;
        }

        /* 채팅 영역 */
        #chat-area {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 메시지 공통 */
        .message {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            max-width: 88%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.bot { align-self: flex-start; }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .bot .avatar { background: #e8efff; }
        .user .avatar { background: #003087; }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.65;
            word-break: keep-all;
        }

        .bot .bubble {
            background: #f4f6fb;
            color: #1a1a2e;
            border-top-left-radius: 4px;
        }

        .user .bubble {
            background: linear-gradient(135deg, #003087, #0057b8);
            color: white;
            border-top-right-radius: 4px;
        }

        /* 빠른 질문 버튼 */
        .quick-questions {
            padding: 0 20px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .quick-btn {
            padding: 8px 14px;
            background: white;
            border: 1.5px solid #c8d8f0;
            border-radius: 20px;
            font-size: 12.5px;
            color: #003087;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .quick-btn:hover {
            background: #003087;
            color: white;
            border-color: #003087;
        }

        /* 입력창 */
        .chat-input-area {
            padding: 14px 16px;
            border-top: 1px solid #eef0f5;
            display: flex;
            gap: 10px;
            background: white;
        }

        .chat-input-area textarea {
            flex: 1;
            padding: 11px 14px;
            border: 2px solid #e0e6f0;
            border-radius: 24px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            line-height: 1.5;
            max-height: 100px;
            transition: border-color 0.2s;
        }

        .chat-input-area textarea:focus { border-color: #003087; }

        .send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #003087, #0057b8);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover { opacity: 0.85; }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* 로딩 점 */
        .loading-dots {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .loading-dots span {
            width: 7px;
            height: 7px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-6px); opacity: 1; }
        }

        /* 하단 리셋 버튼 */
        .reset-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 11px;
            cursor: pointer;
            padding: 4px 8px;
            font-family: inherit;
        }

        .reset-btn:hover { color: #666; }

        .input-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px 8px;
        }

        .input-hint { font-size: 11px; color: #bbb; }

        /* 마크다운 렌더링 스타일 */
        .bubble h2 {
            font-size: 15px;
            font-weight: 700;
            color: #003087;
            margin: 12px 0 6px;
            padding-bottom: 4px;
            border-bottom: 2px solid #dde8f8;
        }

        .bubble h3 {
            font-size: 14px;
            font-weight: 700;
            color: #1a3a6e;
            margin: 10px 0 5px;
        }

        .bubble ul {
            margin: 6px 0 6px 4px;
            padding: 0;
            list-style: none;
        }

        .bubble ul li {
            padding: 2px 0 2px 16px;
            position: relative;
            line-height: 1.65;
        }

        .bubble ul li::before {
            content: '•';
            position: absolute;
            left: 3px;
            color: #0057b8;
            font-weight: bold;
        }

        .bubble ol {
            margin: 6px 0 6px 4px;
            padding-left: 20px;
        }

        .bubble ol li {
            padding: 2px 0;
            line-height: 1.65;
        }

        .bubble hr {
            border: none;
            border-top: 1px solid #dde8f8;
            margin: 10px 0;
        }

        .bubble .contact-box {
            margin-top: 12px;
            padding: 10px 14px;
            background: #fff4e6;
            border-left: 3px solid #f59e0b;
            border-radius: 0 8px 8px 0;
            font-size: 13px;
            color: #92400e;
        }

        .bubble blockquote {
            margin: 6px 0;
            padding: 8px 12px;
            background: #eef3fc;
            border-left: 3px solid #0057b8;
            border-radius: 0 6px 6px 0;
            font-size: 13px;
        }

        .bubble p { margin: 4px 0; }

        /* 테이블 스타일 */
        .bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 13px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(0,0,0,0.08);
        }

        .bubble table th {
            background: #003087;
            color: white;
            padding: 9px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
        }

        .bubble table td {
            padding: 8px 12px;
            border-bottom: 1px solid #e8eef8;
            color: #1a1a2e;
            line-height: 1.5;
        }

        .bubble table tr:last-child td {
            border-bottom: none;
        }

        .bubble table tr:nth-child(even) td {
            background: #f4f7fc;
        }

        .bubble table tr:hover td {
            background: #eaf0fb;
        }
    </style>
</head>
<body>

<div class="chat-wrapper">

    <!-- 헤더 -->
    <div class="chat-header">
        <img class="header-logo-img" src="NEW1.png" alt="SCH 산학협력교육팀" onerror="this.style.display='none'">
        <div class="header-divider"></div>
        <div class="header-text">
            <h1>캡스톤디자인 AI 안내 챗봇</h1>
            <p>순천향대학교 곽시환</p>
        </div>
        <div class="header-badge">🤖 AI 상담 중</div>
    </div>

    <!-- API 키 설정 화면 -->
    <div id="api-setup">
        <div class="setup-card">
            <div class="setup-icon">🔑</div>
            <h2>시작하기 전에</h2>
            <p>순천향대학교 AIHub 플랫폼 API 키를 입력해주세요.<br>입력된 키는 이 브라우저에만 저장됩니다.</p>
            <input type="password" id="api-key-input" placeholder="학교 API 키를 붙여넣으세요" />
            <button class="setup-btn" onclick="startChat()">챗봇 시작하기 →</button>
            <p class="setup-note">🔒 API 키는 외부로 전송되지 않으며 브라우저에만 저장됩니다</p>
        </div>
    </div>

    <!-- 채팅 영역 -->
    <div id="chat-area">

        <!-- 메시지 목록 -->
        <div class="chat-messages" id="messages"></div>

        <!-- 빠른 질문 -->
        <div class="quick-questions" id="quick-questions">
            <button class="quick-btn" onclick="sendQuick('노트북을 지원금으로 살 수 있나요?')">💻 노트북 구매 가능?</button>
            <button class="quick-btn" onclick="sendQuick('지원금은 얼마나 받을 수 있나요?')">💰 지원금 금액</button>
            <button class="quick-btn" onclick="sendQuick('회의비 사용 규칙이 어떻게 되나요?')">☕ 회의비 규칙</button>
            <button class="quick-btn" onclick="sendQuick('교통비로 택시를 탈 수 있나요?')">🚕 택시 사용 가능?</button>
            <button class="quick-btn" onclick="sendQuick('재료비로 살 수 없는 물건이 뭐예요?')">❌ 구매 불가 항목</button>
            <button class="quick-btn" onclick="sendQuick('캡스톤디자인 신청 자격이 어떻게 되나요?')">📋 신청 자격</button>
        </div>

        <!-- 입력창 -->
        <div class="chat-input-area">
            <textarea id="user-input" placeholder="궁금한 점을 물어보세요..." rows="1"
                onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
        </div>

        <div class="input-bottom">
            <span class="input-hint">Enter로 전송 / Shift+Enter로 줄바꿈</span>
        </div>

    </div>
</div>

<script>
// ===== 시스템 프롬프트 (캡스톤디자인 규정) =====
const SYSTEM_PROMPT = `당신은 순천향대학교 캡스톤디자인 지원 프로그램을 안내하는 AI 챗봇입니다.
학생들의 질문에 친절하고 명확하게 한국어로 답변해주세요.

[절대 규칙 - 반드시 지켜야 합니다]
1. 아래 제공된 규정에 명확히 나와 있는 내용만 답변하세요.
2. 규정에 없거나 애매한 내용은 절대로 추측하거나 만들어내지 마세요. 반드시 담당자 문의로 안내하세요.
3. "아마도", "보통은", "일반적으로" 같은 표현으로 불확실한 내용을 답변하지 마세요.
4. 규정에 명확히 없는 특수한 케이스나 예외 상황은 담당자에게 문의하도록 안내하세요.
5. 담당자 연락처: 041-537-0000

[답변 형식]
- 명확한 규정이 있으면: 규정 내용을 정확히 안내
- 규정에 없거나 애매하면: "이 부분은 규정에 명확히 나와 있지 않아 정확한 안내가 어렵습니다. 담당자에게 직접 문의해 주세요. 📞 041-537-0000"
- 답변이 길어질 경우 제목과 목록을 사용해 가독성 있게 작성하세요.

아래는 캡스톤디자인 지원 프로그램의 주요 규정입니다:

## 1. 프로그램 목적
전공 이론을 바탕으로 산업체가 필요로 하는 과제를 팀 프로젝트로 수행하여 창의성과 실무능력을 배양하는 프로그램입니다.

## 2026-1학기 운영 일정
- 지원금 집행 기간: 2026.04.01.(수) ~ 2026.06.03.(수) 10시 (온라인 신청건 한하여 2026.06.05.(금) 18시까지 집행 가능)
- 지원금 집행 증빙서류: 사용 이후 3일 이내 제출 필수
- 결과보고서 및 만족도 설문조사 제출: ~2026.06.19.(금) 10시
- 미사용 예정 팀: 2026.04.15. 10시까지 사업단으로 전화하여 취소 요청 (이후 취소 불가)

## 2. 참여 자격 (모두 충족해야 함)
- 캡스톤디자인 교과목 수강자 (교과목명에 '캡스톤디자인', '종합설계', 'Capstone Design' 부기 필수)
- 3학년 이상 (4학기 이상 수료) 재학생
- 2인 이상 팀 구성 (1인 팀 불가)
- 한 교과목당 학생 1인은 1개 팀에만 참여 가능
- 팀원 전원이 동일 교과 수강

## 3. 지원금액
- 일반형: 4만원 × 학생 수 (팀 최대 40만원)
- 기업연계형: 8만원 × 학생 수 (팀 최대 80만원)
  * 기업연계형은 산업체에서 문제를 제시하고 산업체 인사가 직접 참여하는 형태

## 4. 지원 항목
### 재료비
- 과제와 직접적 관련이 있는 재료성 물품 구입
- 구매금액 합계 50만원(단가 30만원) 미만으로 구매
- 해외결제 불가
- 마일리지 적립이 되는 결제 불가 (예: 네이버페이 포인트 적립)

### 회의비
- 과제 수행에 필요한 팀 회의 시 식대 및 다과비 지원 (장소대여비·온라인 회의 불가)
- 최대 신청 가능 금액의 20%까지만 사용 가능
- 하루 1회 회의만 지원
- 회의 시간은 1시간 이상이어야 함
- 관외 지역에서 회의비 사용 불가
- 회의 장소로 식당·카페 지양 (교수 연구실 등 이용 권장), 회의 장소와 가까운 거리에서 결제
- 지원금액: 1인당 30,000원 (식대와 다과비 중 하나만 선택하여 사용)
- 다과비는 회의 시작 전 결제, 식대는 회의 종료 후 결제
- 저녁 8시~익일 오전 9시 사용 불가, 휴일 사용 불가
- 회의비를 미리 선결제 후 다른 날 사용 불가 (적발 시 환수)
- 냉동만두, 햇반, 소고기 등 회의 식대에 맞지 않는 품목 결제 불가
- 주류 및 유흥업소 결제 불가
- 학과(사업단)에서 대여하는 법인카드로만 집행 (개인카드 및 타 법인카드 불가)
- 회의 사진 필수 (회의 중인 사진만 인정 / 식사 사진, V자 포즈, 수업 중 사진 불가)
- 편의점 과자·빵 등 구매 시 구매물품 사진도 필요
- 사진 재사용 금지 (팀별 회의 사진 비교 예정)
- 서명부 제출 필수 - 직접 자필 서명 (도장X, 온라인서명X, 글씨체가 모두 같은 경우 인정 불가)
- 과제 참여 학생 이외의 학생은 회의 참여 불가

### 교통비
- 과제 수행에 필요한 외부 활동 교통비 지원
- 지원 가능: 시외/고속버스(일반실), 기차(일반실), KTX(일반실)
- 지원 불가: 시내버스, 지하철, 택시, 차량렌트비, 유류비, 프리미엄/특실
- 통학, 학교 방문, 물품 구입을 위한 교통비 불가

// ===== 메시지 추가 =====
function addBotMessage(text) {

// ===== 텍스트 포맷 (마크다운 → HTML 변환) =====
function formatText(raw) {
    // 1. HTML 특수문자 이스케이프 (테이블 | 는 나중에 처리)
    let text = raw
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

    const lines = text.split('\n');
    let html = '';
    let inUl = false;
    let inOl = false;
    let i = 0;

    while (i < lines.length) {
        let line = lines[i];

        // ── 테이블 감지: | 로 시작하는 줄이 연속으로 나오면 테이블 처리 ──
        if (/^\s*\|/.test(line)) {
            // 연속된 | 줄 전부 수집
            const tableLines = [];
            while (i < lines.length && /^\s*\|/.test(lines[i])) {
                tableLines.push(lines[i]);
                i++;
            }

            // 구분선 행 제거 (|---|---| 형태)
            const dataLines = tableLines.filter(l => !/^\s*\|[\s\-|:]+\|\s*$/.test(l));

            if (dataLines.length >= 1) {
                // 리스트 닫기
                if (inUl) { html += '</ul>'; inUl = false; }
                if (inOl) { html += '</ol>'; inOl = false; }

                html += '<table>';

                dataLines.forEach((row, idx) => {
                    // 양쪽 | 제거 후 셀 분리
                    const cells = row
                        .replace(/^\s*\|\s*/, '')
                        .replace(/\s*\|\s*$/, '')
                        .split(/\s*\|\s*/);

                    if (idx === 0) {
                        // 첫 행 = 헤더
                        html += '<thead><tr>';
                        cells.forEach(cell => {
                            html += `<th>${applyInline(cell.trim())}</th>`;
                        });
                        html += '</tr></thead><tbody>';
                    } else {
                        html += '<tr>';
                        cells.forEach(cell => {
                            html += `<td>${applyInline(cell.trim())}</td>`;
                        });
                        html += '</tr>';
                    }
                });

                html += '</tbody></table>';
            }
            continue; // while 루프 상단으로
        }

        // ── 일반 줄 처리 ──
        const isUlItem = /^[-*]\s+/.test(line);
        const isOlItem = /^\d+\.\s+/.test(line);

        if (inUl && !isUlItem) { html += '</ul>'; inUl = false; }
        if (inOl && !isOlItem) { html += '</ol>'; inOl = false; }

        // ## 제목
        if (/^##\s+/.test(line)) {
            html += `<h2>${applyInline(line.replace(/^##\s+/, ''))}</h2>`;
        }
        // ### 소제목
        else if (/^###\s+/.test(line)) {
            html += `<h3>${applyInline(line.replace(/^###\s+/, ''))}</h3>`;
        }
        // --- 구분선
        else if (/^---+$/.test(line.trim())) {
            html += '<hr>';
        }
        // > 인용
        else if (/^>\s+/.test(line)) {
            html += `<blockquote>${applyInline(line.replace(/^>\s+/, ''))}</blockquote>`;
        }
        // 번호 목록
        else if (isOlItem) {
            if (!inOl) { html += '<ol>'; inOl = true; }
            html += `<li>${applyInline(line.replace(/^\d+\.\s+/, ''))}</li>`;
        }
        // 글머리 목록
        else if (isUlItem) {
            if (!inUl) { html += '<ul>'; inUl = true; }
            html += `<li>${applyInline(line.replace(/^[-*]\s+/, ''))}</li>`;
        }
        // 빈 줄
        else if (line.trim() === '') {
            html += '<br>';
        }
        // 일반 텍스트
        else {
            html += `<p>${applyInline(line)}</p>`;
        }

        i++;
    }

    if (inUl) html += '</ul>';
    if (inOl) html += '</ol>';

    // 담당자 연락처 박스 강조
    html = html.replace(
        /📞\s*(041-537-\d{4})/g,
        '<div class="contact-box">📞 담당자 문의: <strong>$1</strong></div>'
    );

    return html;
}

function applyInline(text) {
    return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>');
}

function escapeHtml(text) {
    return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
}

const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzw-g3F8fwxWFFYq8k7UkMsR0oYMkkGMKm0G8JuDGl5TGQ297r_ALtWdxVAywXSBIjD9g/exec';

function logQuestion(question, tokens) {
    fetch(SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            question: question,
            prompt_tokens: tokens ? tokens.prompt_tokens : '-',
            completion_tokens: tokens ? tokens.completion_tokens : '-',
            total_tokens: tokens ? tokens.total_tokens : '-'
        })
    }).catch(() => {});
}

// ===== 메시지 전송 =====
async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    autoResize(input);
    document.getElementById('quick-questions').style.display = 'none';

    addUserMessage(text);
    conversationHistory.push({ role: 'user', content: text });

    document.getElementById('send-btn').disabled = true;
    addLoadingMessage();

    try {
        const response = await fetch('https://factchat-cloud.mindlogic.ai/v1/gateway/chat/completions/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                messages: [
                    { role: 'system', content: SYSTEM_PROMPT },
                    ...conversationHistory
                ],
                max_tokens: 1024,
                temperature: 0.3
            })
        });

        if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.message || `오류 코드: ${response.status}`);
        }

        const data = await response.json();
        const reply = data.choices[0].message.content;
        const usage = data.usage || null;

        logQuestion(conversationHistory[conversationHistory.length - 1].content, usage);

        removeLoadingMessage();
        addBotMessage(reply);
        conversationHistory.push({ role: 'assistant', content: reply });

    } catch (error) {
        removeLoadingMessage();
        addBotMessage(`⚠️ 오류가 발생했습니다.\n\n${error.message}\n\nAPI 키를 확인하거나 잠시 후 다시 시도해주세요.`);
        console.error(error);
    }

    document.getElementById('send-btn').disabled = false;
}

function sendQuick(text) {
    document.getElementById('user-input').value = text;
    sendMessage();
}

// ===== 키보드 처리 =====
function handleKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
