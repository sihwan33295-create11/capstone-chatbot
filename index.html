    <style>

        body {

        }

        .chat-wrapper {

        /* 헤더 */
        .chat-header {
            background: linear-gradient(135deg, #003087 0%, #0057b8 100%);
            color: white;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-logo-img {
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 50%;
            object-fit: contain;
            padding: 6px;
            flex-shrink: 0;
        }

        .header-divider {
            width: 1px;
            height: 36px;
            background: rgba(255,255,255,0.35);
            flex-shrink: 0;
        }

        .header-text h1 {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header-text p {
            font-size: 11.5px;
            opacity: 0.75;
            margin-top: 3px;
        }

        .header-badge {
            margin-left: auto;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* API 키 입력 화면 */
        #api-setup {
            flex: 1;

            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            background: #f8f9fc;
        }

        .setup-card {
            background: white;
            border-radius: 16px;
            padding: 36px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        .setup-icon { font-size: 48px; margin-bottom: 16px; }

        .setup-card h2 {
            font-size: 18px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .setup-card p {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .setup-card input {

            padding: 12px 16px;
            border: 2px solid #e0e6f0;
            border-radius: 10px;
            font-size: 14px;
            font-family: monospace;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 14px;

        .setup-card input:focus { border-color: #003087; }

        .setup-btn {

            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;

        .setup-btn:hover { opacity: 0.9; }

        .setup-note {
            margin-top: 14px;
            font-size: 12px;
            color: #999;
        }

        /* 채팅 영역 */
        #chat-area {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;

            overflow-y: auto;

        .avatar {

            height: 36px;

            align-items: center;
            justify-content: center;
            font-size: 18px;

        .bot .avatar { background: #e8efff; }

            gap: 10px;

            padding: 11px 14px;
            border: 2px solid #e0e6f0;

            display: flex;

            height: 7px;

        .bubble hr {

        .bubble blockquote {

        .bubble table th {

            padding: 9px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
        }

        .bubble table td {
            padding: 8px 12px;
            border-bottom: 1px solid #e8eef8;
            color: #1a1a2e;
            line-height: 1.5;
        }

        .bubble table tr:last-child td {
            border-bottom: none;
        }

        .bubble table tr:nth-child(even) td {
            background: #f4f7fc;
        }

        .bubble table tr:hover td {
            background: #eaf0fb;
        }
    </style>
</head>

## 📦 Ⅰ. 재료비

### 지원 내용
과제와 직접 관련이 있으며 과제 성격에 부합하는 재료성 물품 구입

### 구매 절차
**① 온라인 법인카드 결제**
재료비 신청 → 신청 승인 → 학과사무실에 카드 결제 일정 문의 → 학과사무실 방문 및 온라인 결제, 물품 배송 → 지출증빙 작성·승인
※ 사전 연락 없이 방문 시 결제 불가할 수 있음

**② 오프라인 법인카드 결제**
재료비 신청 → 신청 승인 → 학과사무실에 카드 대여 일정 문의 → 카드 대여·구매·반납 → 지출증빙 작성·승인
※ 사전 연락 없이 방문 시 대여 불가할 수 있음
※ 카드 반납 시 원본 영수증 제출 필수

**③ 세금계산서(후불결제)**
재료비 신청 → 신청 승인 → 발주·물품 도착 후 세금계산서 발급 → 지출증빙 작성·승인
※ 세금계산서 발급 사업자번호: 312-82-10071 (순천향대학교 산학협력단)
※ 메일주소는 학과 조교선생님께 문의 (학과마다 상이)
※ 소액은 카드 사용 권장 (세금계산서는 절차 복잡, 대금 지급까지 오래 걸림)
※ 학생 개인 카드 사용 불가

### 증빙서류
- 카드(온라인): 견적서, 100만원 이상 시 비교견적서, 거래명세서, 구매처 출력 영수증
- 카드(오프라인): 견적서, 100만원 이상 시 비교견적서, 거래명세서, 원본 영수증
- 세금계산서: 견적서, 100만원 이상 시 비교견적서, 세금계산서·통장사본·사업자등록증
- 모든 결제: 물품검수조서(사진) 필수

### 재료비 주의사항
- 결제건별로 신청 (여러 업체면 각 1건씩)
- 업체명은 구매 사이트명 작성 (예: 쿠팡 ■■상점 → 업체명: 쿠팡)
- 적립금 적립되는 사이트 구매 불가
- 2주 이내 동일 업체 합산 300만원 이상 결제 불가
- 1회 결제 300만원 이상 불가
- 견적서 견적일자: 결제일 이전(또는 동일)
- 거래명세서 거래일자: 결제일과 동일
- 물품 사진: 물품별 수량이 보이도록 촬영 (택배상자 사진, 한꺼번에 찍은 사진 불가)

### 구매내역 작성 예시
- 견적서의 품명·단가·수량·부가세·배송비를 그대로 시스템에 입력
- 시스템 최종 합계가 견적서 합계와 반드시 일치하는지 확인
- 예시: 공급가액 118,000원 + 부가세 11,800원 + 배송비 0원 = 합계 129,800원
- 물품사진은 신청 시가 아닌 구매 완료 후 첨부

## ☕ Ⅱ. 회의비

### 지원 내용
- 회의 식대 (회의 종료 후 결제) 또는 회의 다과비 (회의 시작 전 결제): 1인당 30,000원 이하 / 식대와 다과비 중 하나만 선택, 최대 지원금액의 20%까지 회의비로 사용 가능
- 회의 최소 1시간 이상, 1일 1회 지원

### 결제 시간 예시
- [다과비만] 다과비 결제(10:45) → 회의(11:00~12:00)
- [식비만] 회의(11:00~12:00) → 식비 결제(12:55)

### 회의비 주의사항
- 회의 장소: 식당·카페 지양, 교수님 연구실 등 이용 권장
- 회의장소와 가까운 거리에서 결제
- 주류·유흥업소 결제 불가
- 온라인 회의 시 회의비 미지원, 장소 대여비 불가
- 저녁 8시~익일 9시 사용 불가, 휴일 사용 불가
- 회의 서명부 제출 (도장·글씨체 모두 같으면 인정 불가, 반드시 자필 서명)
- 회의비 미리 선결제 후 다른 날 사용 불가 (적발 시 환수)
- 배달의 경우 만나서 카드 결제 후 배달기사에게 매출전표 문자 요청
- 오프라인 결제 시 카드 반납 때 원본 영수증 제출 필수
- 냉동만두·햇반·소고기 등 식대·다과비에 어긋나는 품목 결제 불가
- 사진 재사용 금지 / 참석자 인원과 일치 (촬영자 1명 제외 가능)
- 회의 중인 사진만 첨부 (식사 사진 불가, V하고 있는 사진 불가, 수업 중 사진 불가, 엎드려 있는 사진 불가, 핸드폰 등 딴 짓 하고 있는 사진 불가)
- 카페·음식점이 아닌 편의점·파리바게뜨 등 물품 구매 시 구매물품 사진 필요

### 증빙서류
영수증(매출전표), 참석자 서명부, 회의 사진, 회의록(온라인 작성)

## ❓ FAQ

**Q. 여러 업체에서 구매하면 신청을 어떻게 하나요?**
A. 결제건별로 각각 신청합니다. 단, 쿠팡처럼 장바구니에서 한꺼번에 구매 가능하면 하나로 제출 가능합니다.

**Q. 견적서·거래명세서는 어떻게 받나요?**
A. 학생이 작성하는 것이 아니라 구매 업체에서 받는 서류입니다. 구매 전 업체에 확인하세요. 업체에서 불가하면 서류 발급이 가능한 다른 업체로 변경해야 합니다.

**Q. 비교견적서가 뭔가요?**
A. 100만원 이상 구매 시 같은 물품에 대해 2개 업체에 견적서를 받아 비교한 서류입니다.

**Q. 매출전표는 어디서 출력하나요?**
A. 구매한 홈페이지 또는 주문 시 작성한 메일에서 '매출전표', '카드영수증'을 찾으세요. 없으면 업체에 요청하시면 됩니다. 매출전표에는 승인번호·구매일시가 포함되어 있어야 합니다.

**Q. 구매내역 캡처는 어떻게 하나요?**
A. 구매한 홈페이지에서 결제일시·물품·총금액(배송비 포함)이 보이도록 캡처합니다. 적립금 부분은 캡처에 포함되지 않도록 주의하세요. Ctrl+P로 PDF 저장 후 첨부도 가능합니다.

**Q. 팀원이 신청 화면에 안 뜨는 이유는?**
A. ① 해당 팀원이 링크 홈페이지 미가입(로그인 및 개인정보동의 미완료) ② 동일한 수강번호가 아닌 경우 ③ 교과목신청현황에 미등록된 경우 중 하나입니다. 2,3번 일 경우에는 담당자에게 전화하세요.

**Q. 지원금을 재료비에서 회의비로 바꾸고 싶은데요?**
A. 지원금변경신청 메뉴에서 신청 가능합니다. 단, 완료되지 않은 지급신청건이 있으면 변경 불가하며, 변경신청기간 내에만 신청 가능합니다. 회의비는 총금액의 20%까지만 사용 가능한 점도 유의하세요.

**Q. 세금계산서 발급 시 사업자번호가 뭔가요?**
A. 312-82-10071 (순천향대학교 산학협력단)입니다. 메일주소는 학과 조교선생님께 문의해 주세요.

**Q. 신청 먼저 안 하고 결제부터 해버렸어요**
A. 그러면 안됩니다. 담당자에게 전화하세요. 📞 041-537-8804 또는 041-530-4857

**Q. 승인·반려 알림이 오나요?**

**Q. 30만원 이하도 물품 사진(물품검수조서)을 찍어야 하나요?**

**Q. 300만원 기준은 팀 단위인가요, 학과 전체인가요?**
A. 팀 단위입니다.

A. 범용성 기자재이지만 과제 성격에 부합한다고 판단되면 승인해줍니다. 사전에 담당자에게 전화로 문의하세요. 📞 041-537-8804 또는 041-530-4857

**Q. 주문제작도 재료비로 신청 가능한가요?**
A. 과제 내용에 따라 적합성을 판단해서 승인 또는 반려합니다. 사전에 담당자에게 전화로 문의하세요.

**Q. 중고거래(당근마켓, 중고나라 등)로 구매할 수 있나요?**
A. 사업자등록번호가 없기 때문에 절대 불가능합니다.

**Q. 현금영수증은 가능한가요?**
A. 현금 결제 자체가 불가능하기 때문에 현금영수증도 불가합니다. 법인카드 또는 세금계산서만 가능합니다.

**Q. 할인쿠폰이나 즉시할인을 적용했을 때 금액 기준이 어떻게 되나요?**
A. 어떤 할인이든 상관없이 실제 결제금액을 기준으로 증빙합니다.

**Q. 쿠팡에서 로켓배송과 일반판매자 상품을 동시에 주문하면 건수가 어떻게 되나요?**
A. 결제 건수 기준입니다. 한 번에 결제됐으면 1건으로 처리합니다.

**Q. 신청을 취소하고 싶을 때는 어떻게 하나요?**
A. 담당자에게 전화해서 반려 처리를 요청하면 됩니다. 📞 041-537-8804 또는 041-530-4857

**Q. 신청 후 가격이 변동되면 어떻게 하나요?**
A. 기존 신청 건을 수정해야 합니다. 담당자에게 연락하세요.

**Q. 물품이 품절됐을 때는 어떻게 하나요?**
A. 아직 결제 전이라면 신청 건을 수정하고, 결제 후라면 환불 처리됩니다.

**Q. 부분 배송(일부만 먼저 도착)인 경우 증빙은 어떻게 하나요?**
A. 전체 물품이 다 도착했을 때 한꺼번에 증빙하면 됩니다.

**Q. 환불·반품이 발생하면 어떻게 되나요?**

**Q. 비교견적서는 쿠팡 내 다른 판매자로 해도 되나요?**
A. 사업자번호가 다른 업체여야 합니다. 쿠팡 내 다른 판매자라도 사업자번호가 다르면 가능합니다.

**Q. 지원금 잔액은 어디서 확인하나요?**
A. 팀장 계정으로 로그인 → MY PAGE → 캡스톤디자인관리 → 해당 프로그램 보기 → 지원금신청관리에서 확인 가능합니다.

## ☕ 회의비 추가 안내

**Q. 회의비 20%(다과비 한도)는 어떻게 계산하나요?**
A. 팀이 신청 가능한 최대 금액(팀원 수 × 일반형 100,000원 / 기업연계형 300,000원)의 20%입니다. 실수로 총액을 적게 신청했더라도 원래 최대 금액의 20%로 책정합니다.

**Q. 1인당 30,000원 계산은 어떻게 하나요?**
A. 배달비 포함하여 총 결제금액을 인원수로 나눈 금액이 1인당 30,000원 이하여야 합니다.

**Q. 카페에서 결제해도 되나요?**
A. 네, 가능합니다. '지양'이지 금지는 아닙니다.

**Q. 학교 구내식당도 가능한가요?**
A. 네, 학교 구내식당도 허용합니다.

**Q. '가까운 거리' 기준이 뭔가요?**
A. 같은 지역이면 웬만하면 괜찮습니다. 예를 들어 학교에서 회의했는데 결제 장소가 서울이면 반려됩니다.

**Q. 배달앱(배민, 쿠팡이츠 등)으로 주문하면 어떻게 되나요?**
A. 배달앱 내에서 카드 결제도 가능하고, 앱 내 영수증도 인정됩니다.

**Q. 배달기사가 매출전표 문자를 거부하면 어떻게 하나요?**
A. 주문 전에 미리 매출전표가 필요하다고 말하고, 안 된다고 하면 다른 곳에서 결제해야 합니다. 배달앱으로 주문한 경우 앱 내에서 영수증 발급이 가능합니다.

**Q. 편의점에서 결제할 때 기준이 있나요?**
A. 구매 물품 개수가 회의 참석 인원 수와 맞는지 확인합니다.

**Q. 지도교수님도 회의비 인원에 포함되나요?**
A. 네, 지도교수님 포함 가능합니다.

**Q. 팀원 전원이 참석해야 하나요?**
A. 꼭 전원 참석이 아니어도 됩니다.

**Q. 오전·오후 각각 회의하면 둘 다 지원되나요?**
A. 아닙니다. 회의비는 하루 1회만 지원됩니다. 둘 중 학생이 선택하면 됩니다.

**Q. 온라인+오프라인 혼합 회의는 어떻게 되나요?**
A. 오프라인으로 직접 참석한 팀원에 한해서만 지원됩니다.

**Q. 다과비와 식비를 같은 날 둘 다 쓸 수 있나요?**
A. 아닙니다. 회의비는 하루 1회, 다과비 또는 식비 중 하나만 선택 가능합니다.

**Q. 회의 중 식사는 가능한가요?**
A. 안 됩니다. 식사는 회의 종료 후에 진행해야 하며, 회의 사진도 식당에서 찍으면 안 됩니다.

**Q. 회의록은 어디에 작성하나요?**
A. 별도 양식이 없습니다. 홈페이지 증빙 화면에서 회의 내용을 간략히 작성하는 칸과 사진 첨부 칸이 있는데, 그것이 곧 회의록입니다.

**Q. 회의 1시간은 어떻게 측정하나요?**
A. 시작·종료 시간은 학생이 임의로 정합니다. 담당자는 영수증 결제 시각과 대조하여 확인합니다.

**Q. 먹어도 되는 음식 기준이 뭔가요?**
A. 당장 먹을 수 있는 음식은 괜찮습니다. 냉동식품, 보관 가능한 대용량 음식 등은 반려됩니다.

const apiKey = 'z8qeuXf5vyZoD0V25IF9VgGUi9lAYJ15';
const apiKeyBackup = '3FBqhbOShFmZRjrCxUfzM9XAMZFY3xf4';
let userName = '';
let userId = '';

// ===== 로그인 후 채팅 시작 =====
function startChat() {
    const id = document.getElementById('input-id').value.trim();
    const name = document.getElementById('input-name').value.trim();
    if (!id || !name) {
        alert('학번/사번과 이름을 모두 입력해주세요.');
        return;
    }
    userId = id;
    userName = name;

    document.getElementById('api-setup').style.display = 'none';
    document.getElementById('chat-area').style.display = 'flex';
    document.getElementById('chat-area').style.flexDirection = 'column';

    addBotMessage(`안녕하세요, ${userName}님! 👋 저는 순천향대학교 캡스톤디자인 AI 안내 챗봇입니다.\n\n지원금 사용 규정, 구매 가능 항목, 신청 절차 등 캡스톤디자인에 대해 무엇이든 물어보세요!\n\n아래 버튼을 눌러 자주 묻는 질문을 바로 확인하실 수도 있어요 😊`);
}

// ===== 메시지 추가 =====
function addBotMessage(text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message bot';
    div.innerHTML = `
        <div class="avatar">🤖</div>
        <div class="bubble">${formatText(text)}</div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function addUserMessage(text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message user';
    div.innerHTML = `
        <div class="avatar" style="color:white;">👤</div>
        <div class="bubble">${escapeHtml(text)}</div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function addLoadingMessage() {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'loading-msg';
    div.innerHTML = `
        <div class="avatar">🤖</div>
        <div class="bubble">
            <div class="loading-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function removeLoadingMessage() {
    const loading = document.getElementById('loading-msg');
    if (loading) loading.remove();
}

// ===== 텍스트 포맷 (마크다운 → HTML 변환) =====
function formatText(raw) {
    // 1. HTML 특수문자 이스케이프 (테이블 | 는 나중에 처리)
    let text = raw
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

    const lines = text.split('\n');
    let html = '';
    let inUl = false;
    let inOl = false;
    let i = 0;

    while (i < lines.length) {
        let line = lines[i];

        // ── 테이블 감지: | 로 시작하는 줄이 연속으로 나오면 테이블 처리 ──
        if (/^\s*\|/.test(line)) {
            // 연속된 | 줄 전부 수집
            const tableLines = [];
            while (i < lines.length && /^\s*\|/.test(lines[i])) {
                tableLines.push(lines[i]);
                i++;
            }

            // 구분선 행 제거 (|---|---| 형태)
            const dataLines = tableLines.filter(l => !/^\s*\|[\s\-|:]+\|\s*$/.test(l));

            if (dataLines.length >= 1) {
                // 리스트 닫기
                if (inUl) { html += '</ul>'; inUl = false; }
                if (inOl) { html += '</ol>'; inOl = false; }

                html += '<table>';

                dataLines.forEach((row, idx) => {
                    // 양쪽 | 제거 후 셀 분리
                    const cells = row
                        .replace(/^\s*\|\s*/, '')
                        .replace(/\s*\|\s*$/, '')
                        .split(/\s*\|\s*/);

                    if (idx === 0) {
                        // 첫 행 = 헤더
                        html += '<thead><tr>';
                        cells.forEach(cell => {
                            html += `<th>${applyInline(cell.trim())}</th>`;
                        });
                        html += '</tr></thead><tbody>';
                    } else {
                        html += '<tr>';
                        cells.forEach(cell => {
                            html += `<td>${applyInline(cell.trim())}</td>`;
                        });
                        html += '</tr>';
                    }
                });

                html += '</tbody></table>';
            }
            continue; // while 루프 상단으로
        }

        // ── 일반 줄 처리 ──
        const isUlItem = /^[-*]\s+/.test(line);
        const isOlItem = /^\d+\.\s+/.test(line);

        if (inUl && !isUlItem) { html += '</ul>'; inUl = false; }
        if (inOl && !isOlItem) { html += '</ol>'; inOl = false; }

        // ## 제목
        if (/^##\s+/.test(line)) {
            html += `<h2>${applyInline(line.replace(/^##\s+/, ''))}</h2>`;
        }
        // ### 소제목
        else if (/^###\s+/.test(line)) {
            html += `<h3>${applyInline(line.replace(/^###\s+/, ''))}</h3>`;
        }
        // --- 구분선
        else if (/^---+$/.test(line.trim())) {
            html += '<hr>';
        }
        // > 인용
        else if (/^>\s+/.test(line)) {
            html += `<blockquote>${applyInline(line.replace(/^>\s+/, ''))}</blockquote>`;
        }
        // 번호 목록
        else if (isOlItem) {
            if (!inOl) { html += '<ol>'; inOl = true; }
            html += `<li>${applyInline(line.replace(/^\d+\.\s+/, ''))}</li>`;
        }
        // 글머리 목록
        else if (isUlItem) {
            if (!inUl) { html += '<ul>'; inUl = true; }
            html += `<li>${applyInline(line.replace(/^[-*]\s+/, ''))}</li>`;
        }
        // 빈 줄
        else if (line.trim() === '') {
            html += '<br>';
        }
        // 일반 텍스트
        else {
            html += `<p>${applyInline(line)}</p>`;
        }

        i++;
    }

    if (inUl) html += '</ul>';
    if (inOl) html += '</ol>';

    // 담당자 연락처 박스 강조
    html = html.replace(
        /📞\s*(041-537-\d{4})/g,
        '<div class="contact-box">📞 담당자 문의: <strong>$1</strong></div>'
    );

    return html;
}

function applyInline(text) {
    return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>');
}

function escapeHtml(text) {
    return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
}

// ===== 구글 시트 질문 기록 =====
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzw-g3F8fwxWFFYq8k7UkMsR0oYMkkGMKm0G8JuDGl5TGQ297r_ALtWdxVAywXSBIjD9g/exec';

function logQuestion(question, answer) {
    fetch(SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            question: question,
            answer: answer,
            userId: userId,
            userName: userName
        })
    }).catch(() => {});
}

// ===== 메시지 전송 =====
async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    autoResize(input);
    document.getElementById('quick-questions').style.display = 'none';

    addUserMessage(text);
    conversationHistory.push({ role: 'user', content: text });

    document.getElementById('send-btn').disabled = true;
    addLoadingMessage();

    const tryFetch = async (key) => {
        const response = await fetch('https://factchat-cloud.mindlogic.ai/v1/gateway/chat/completions/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${key}`
            },
            body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                messages: [
                    { role: 'system', content: SYSTEM_PROMPT },
                    ...conversationHistory
                ],
                max_tokens: 1024,
                temperature: 0.3
            })
        });
        if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.message || `오류 코드: ${response.status}`);
        }
        return response.json();
    };

    try {
        let data;
        try {
            data = await tryFetch(apiKey);
        } catch (e) {
            data = await tryFetch(apiKeyBackup);
        }

        const reply = data.choices[0].message.content;

        logQuestion(text, reply);

        removeLoadingMessage();
        addBotMessage(reply);
        conversationHistory.push({ role: 'assistant', content: reply });

    } catch (error) {
        removeLoadingMessage();
        addBotMessage(`⚠️ 오류가 발생했습니다.\n\n${error.message}\n\nAPI 키를 확인하거나 잠시 후 다시 시도해주세요.`);
        console.error(error);
    }

    document.getElementById('send-btn').disabled = false;
}

function sendQuick(text) {
    document.getElementById('user-input').value = text;
    sendMessage();
}

// ===== 키보드 처리 =====
function handleKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
</script>
