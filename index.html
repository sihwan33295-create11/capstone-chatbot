            flex-shrink: 0;

        .header-divider {

        .header-text h1 {

        .header-badge {

        }

        .bubble table tr:nth-child(even) td {
            background: #f4f7fc;
        }

        .bubble table tr:hover td {

## 📦 Ⅰ. 재료비

### 지원 내용
과제와 직접 관련이 있으며 과제 성격에 부합하는 재료성 물품 구입

### 구매 절차
**① 온라인 법인카드 결제**
재료비 신청 → 신청 승인 → 학과사무실에 카드 결제 일정 문의 → 학과사무실 방문 및 온라인 결제, 물품 배송 → 지출증빙 작성·승인
※ 사전 연락 없이 방문 시 결제 불가할 수 있음

**② 오프라인 법인카드 결제**
재료비 신청 → 신청 승인 → 학과사무실에 카드 대여 일정 문의 → 카드 대여·구매·반납 → 지출증빙 작성·승인
※ 사전 연락 없이 방문 시 대여 불가할 수 있음
※ 카드 반납 시 원본 영수증 제출 필수

**③ 세금계산서(후불결제)**
재료비 신청 → 신청 승인 → 발주·물품 도착 후 세금계산서 발급 → 지출증빙 작성·승인
※ 세금계산서 발급 사업자번호: 312-82-10071 (순천향대학교 산학협력단)
※ 메일주소는 학과 조교선생님께 문의 (학과마다 상이)
※ 소액은 카드 사용 권장 (세금계산서는 절차 복잡, 대금 지급까지 오래 걸림)
※ 학생 개인 카드 사용 불가

### 증빙서류
- 카드(온라인): 견적서, 100만원 이상 시 비교견적서, 거래명세서, 구매처 출력 영수증
- 카드(오프라인): 견적서, 100만원 이상 시 비교견적서, 거래명세서, 원본 영수증
- 세금계산서: 견적서, 100만원 이상 시 비교견적서, 세금계산서·통장사본·사업자등록증
- 모든 결제: 물품검수조서(사진) 필수
※ 카드(온라인) 30만원 이하: 견적서·거래명세서 대신 구매 내역 캡처본으로 대체 가능

### 재료비 주의사항
- 결제건별로 신청 (여러 업체면 각 1건씩)
- 업체명은 구매 사이트명 작성 (예: 쿠팡 ■■상점 → 업체명: 쿠팡)
- 적립금 적립되는 사이트 구매 불가
- 2주 이내 동일 업체 합산 300만원 이상 결제 불가
- 1회 결제 300만원 이상 불가
- 견적서 견적일자: 결제일 이전(또는 동일)
- 거래명세서 거래일자: 결제일과 동일
- 물품 사진: 물품별 수량이 보이도록 촬영 (택배상자 사진, 한꺼번에 찍은 사진 불가)

### 구매내역 작성 예시

## ☕ Ⅱ. 회의비

### 지원 내용
- 회의 식대 (회의 종료 후 결제): 1인당 30,000원 이하 / 식대와 다과비 중 하나만 선택
- 회의 다과비 (회의 시작 전 결제): 최대 지원금액의 20%까지
- 회의 최소 1시간 이상, 1일 1회 지원

### 결제 시간 예시
- [다과비만] 다과비 결제(10:45) → 회의(11:00~12:00)
- [식비만] 회의(11:00~12:00) → 식비 결제(12:55)

### 회의비 주의사항
- 회의 장소: 식당·카페 지양, 교수님 연구실 등 이용 권장
- 회의장소와 가까운 거리에서 결제
- 주류·유흥업소 결제 불가
- 온라인 회의 시 회의비 미지원, 장소 대여비 불가
- 저녁 8시~익일 9시 사용 불가, 휴일 사용 불가
- 회의 서명부 제출 (도장·글씨체 모두 같으면 인정 불가, 반드시 자필 서명)
- 회의비 미리 선결제 후 다른 날 사용 불가 (적발 시 환수)
- 배달의 경우 만나서 카드 결제 후 배달기사에게 매출전표 문자 요청
- 오프라인 결제 시 카드 반납 때 원본 영수증 제출 필수
- 냉동만두·햇반·소고기 등 식대·다과비에 어긋나는 품목 결제 불가
- 사진 재사용 금지 / 참석자 인원과 일치 (촬영자 1명 제외 가능)
- 회의 중인 사진만 첨부 (식사 사진, V 사진, 수업 중 사진 불가)
- 카페·음식점이 아닌 편의점·파리바게뜨 등 물품 구매 시 구매물품 사진 필요

### 증빙서류
영수증(매출전표), 참석자 서명부, 회의 사진, 회의록(온라인 작성)

## ❓ FAQ

**Q. 여러 업체에서 구매하면 신청을 어떻게 하나요?**
A. 결제건별로 각각 신청합니다. 단, 쿠팡처럼 장바구니에서 한꺼번에 구매 가능하면 하나로 제출 가능합니다.

**Q. 견적서·거래명세서는 어떻게 받나요?**
A. 학생이 작성하는 것이 아니라 구매 업체에서 받는 서류입니다. 구매 전 업체에 확인하세요. 업체에서 불가하면 서류 발급이 가능한 다른 업체로 변경해야 합니다.

**Q. 비교견적서가 뭔가요?**
A. 100만원 이상 구매 시 같은 물품에 대해 2개 업체에 견적서를 받아 비교한 서류입니다.

**Q. 매출전표는 어디서 출력하나요?**
A. 구매한 홈페이지 또는 주문 시 작성한 메일에서 '매출전표', '카드영수증'을 찾으세요. 없으면 업체에 요청하시면 됩니다. 매출전표에는 승인번호·구매일시가 포함되어 있어야 합니다.

**Q. 구매내역 캡처는 어떻게 하나요?**
A. 구매한 홈페이지에서 결제일시·물품·총금액(배송비 포함)이 보이도록 캡처합니다. 적립금 부분은 캡처에 포함되지 않도록 주의하세요. Ctrl+P로 PDF 저장 후 첨부도 가능합니다.

**Q. 팀원이 신청 화면에 안 뜨는 이유는?**
A. ① 해당 팀원이 링크 홈페이지 미가입(로그인 및 개인정보동의 미완료) ② 동일한 수강번호가 아닌 경우 ③ 교과목신청현황에 미등록된 경우 중 하나입니다.

**Q. 지원금을 재료비에서 회의비로 바꾸고 싶은데요?**
A. 지원금변경신청 메뉴에서 신청 가능합니다. 단, 완료되지 않은 지급신청건이 있으면 변경 불가하며, 변경신청기간 내에만 신청 가능합니다. 회의비는 총금액의 20%까지만 사용 가능한 점도 유의하세요.

**Q. 세금계산서 발급 시 사업자번호가 뭔가요?**
A. 312-82-10071 (순천향대학교 산학협력단)입니다. 메일주소는 학과 조교선생님께 문의해 주세요.`;

    div.innerHTML = `
        <div class="avatar" style="color:white;">👤</div>
        <div class="bubble">${escapeHtml(text)}</div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function addLoadingMessage() {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'loading-msg';
    div.innerHTML = `
        <div class="avatar">🤖</div>
        <div class="bubble">
            <div class="loading-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    `;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function removeLoadingMessage() {
    const loading = document.getElementById('loading-msg');
    if (loading) loading.remove();
}

// ===== 텍스트 포맷 (마크다운 → HTML 변환) =====
function formatText(raw) {
    // 1. HTML 특수문자 이스케이프 (테이블 | 는 나중에 처리)
    let text = raw
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

    const lines = text.split('\n');
    let html = '';
    let inUl = false;
    let inOl = false;
    let i = 0;

    while (i < lines.length) {
        let line = lines[i];

        // ── 테이블 감지: | 로 시작하는 줄이 연속으로 나오면 테이블 처리 ──
        if (/^\s*\|/.test(line)) {
            // 연속된 | 줄 전부 수집
            const tableLines = [];
            while (i < lines.length && /^\s*\|/.test(lines[i])) {
                tableLines.push(lines[i]);
                i++;
            }

            // 구분선 행 제거 (|---|---| 형태)
            const dataLines = tableLines.filter(l => !/^\s*\|[\s\-|:]+\|\s*$/.test(l));

            if (dataLines.length >= 1) {
                // 리스트 닫기
                if (inUl) { html += '</ul>'; inUl = false; }
                if (inOl) { html += '</ol>'; inOl = false; }

                html += '<table>';

                dataLines.forEach((row, idx) => {
                    // 양쪽 | 제거 후 셀 분리
                    const cells = row
                        .replace(/^\s*\|\s*/, '')
                        .replace(/\s*\|\s*$/, '')
                        .split(/\s*\|\s*/);

                    if (idx === 0) {
                        // 첫 행 = 헤더
                        html += '<thead><tr>';
                        cells.forEach(cell => {
                            html += `<th>${applyInline(cell.trim())}</th>`;
                        });
                        html += '</tr></thead><tbody>';
                    } else {
                        html += '<tr>';
                        cells.forEach(cell => {
                            html += `<td>${applyInline(cell.trim())}</td>`;
                        });
                        html += '</tr>';
                    }
                });

                html += '</tbody></table>';
            }
            continue; // while 루프 상단으로
        }

        // ── 일반 줄 처리 ──
        const isUlItem = /^[-*]\s+/.test(line);
        const isOlItem = /^\d+\.\s+/.test(line);

        if (inUl && !isUlItem) { html += '</ul>'; inUl = false; }
        if (inOl && !isOlItem) { html += '</ol>'; inOl = false; }

        // ## 제목
        if (/^##\s+/.test(line)) {
            html += `<h2>${applyInline(line.replace(/^##\s+/, ''))}</h2>`;
        }
        // ### 소제목
        else if (/^###\s+/.test(line)) {
            html += `<h3>${applyInline(line.replace(/^###\s+/, ''))}</h3>`;
        }
        // --- 구분선
        else if (/^---+$/.test(line.trim())) {
            html += '<hr>';
        }
        // > 인용
        else if (/^>\s+/.test(line)) {
            html += `<blockquote>${applyInline(line.replace(/^>\s+/, ''))}</blockquote>`;
        }
        // 번호 목록
        else if (isOlItem) {
            if (!inOl) { html += '<ol>'; inOl = true; }
            html += `<li>${applyInline(line.replace(/^\d+\.\s+/, ''))}</li>`;
        }
        // 글머리 목록
        else if (isUlItem) {
            if (!inUl) { html += '<ul>'; inUl = true; }
            html += `<li>${applyInline(line.replace(/^[-*]\s+/, ''))}</li>`;
        }
        // 빈 줄
        else if (line.trim() === '') {
            html += '<br>';
        }
        // 일반 텍스트
        else {
            html += `<p>${applyInline(line)}</p>`;
        }

        i++;
    }

    if (inUl) html += '</ul>';
    if (inOl) html += '</ol>';

    // 담당자 연락처 박스 강조
    html = html.replace(
        /📞\s*(041-537-\d{4})/g,
        '<div class="contact-box">📞 담당자 문의: <strong>$1</strong></div>'
    );

    return html;
}

function applyInline(text) {
    return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>');
}

function escapeHtml(text) {
    return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
}

const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzw-g3F8fwxWFFYq8k7UkMsR0oYMkkGMKm0G8JuDGl5TGQ297r_ALtWdxVAywXSBIjD9g/exec';

function logQuestion(question) {
    fetch(SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            userId: userId,
            userName: userName,
            question: question
        })
    }).catch(() => {});
}

// ===== 메시지 전송 =====
async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    autoResize(input);
    document.getElementById('quick-questions').style.display = 'none';

    addUserMessage(text);
    conversationHistory.push({ role: 'user', content: text });

    document.getElementById('send-btn').disabled = true;
    addLoadingMessage();

    try {
        const response = await fetch('https://factchat-cloud.mindlogic.ai/v1/gateway/chat/completions/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: 'claude-sonnet-4-6',
                messages: [
                    { role: 'system', content: SYSTEM_PROMPT },
                    ...conversationHistory
                ],
                max_tokens: 1024,
                temperature: 0.3
            })
        });

        if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.message || `오류 코드: ${response.status}`);
        }

        const data = await response.json();
        const reply = data.choices[0].message.content;

        logQuestion(text);

        removeLoadingMessage();
        addBotMessage(reply);
        conversationHistory.push({ role: 'assistant', content: reply });

    } catch (error) {
        removeLoadingMessage();
        addBotMessage(`⚠️ 오류가 발생했습니다.\n\n${error.message}\n\nAPI 키를 확인하거나 잠시 후 다시 시도해주세요.`);
        console.error(error);
    }

    document.getElementById('send-btn').disabled = false;
}

function sendQuick(text) {
    document.getElementById('user-input').value = text;
    sendMessage();
}

// ===== 키보드 처리 =====
function handleKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
